<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hato Master Pro</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Special+Elite&family=Oswald:wght@400;600&display=swap" rel="stylesheet">
</head>
<body>

    <button id="btn-admin-toggle" onclick="abrirLogin()">👤 PANEL PRIVADO</button>
    <div id="cart-float" onclick="abrirCarrito()">🛒 <span id="cart-count">0</span></div>

    <header>
        <h1 id="display-nombre-rest">EL GRAN HATO</h1>
        <p id="display-ubicacion">📍 CARGANDO...</p>
        
        <div class="redes-header">
            <a id="link-facebook" href="#" target="_blank" style="display:none;"><i class="fab fa-facebook-f"></i></a>
            <a id="link-instagram" href="#" target="_blank" style="display:none;"><i class="fab fa-instagram"></i></a>
            <a id="link-tiktok" href="#" target="_blank" style="display:none;"><i class="fab fa-tiktok"></i></a>
        </div>

        <div style="margin-top:20px;"><b id="valor-tasa" style="font-size:2rem; background:white; color:black; padding:10px 30px; border-radius:15px; border:4px solid var(--soga);">Tasa: -- Bs.</b></div>
    </header>

    <nav class="tabs-cliente" id="categorias-bar"></nav>

    <div id="modal-login" class="modal">
        <div class="modal-content">
            <span style="float:right; cursor:pointer; font-size:60px; color:red; font-weight:bold;" onclick="cerrarModal('modal-login')">&times;</span>
            
            <div id="auth-login-view">
                <h2 style="text-align:center; color:var(--naranja); font-size:3.5rem;">ENTRAR</h2>
                <label>Usuario o Correo:</label>
                <input type="text" id="login-id" placeholder="Nombre o email">
                <label>Contraseña:</label>
                <input type="password" id="login-pass" placeholder="******">
                <div style="background:#f0f0f0; padding:25px; border:5px solid var(--soga); margin:20px 0; text-align:center; border-radius:20px;">
                    <p style="font-size:1.8rem;">SEGURIDAD: ¿Cuánto es <b id="captcha-pregunta" style="color:var(--naranja)"></b>?</p>
                    <input type="number" id="captcha-respuesta">
                </div>
                <button class="btn-llanero" onclick="iniciarSesion()">ENTRAR</button>
                <p style="text-align:center; margin-top:30px;">¿Nuevo dueño? <span style="color:var(--naranja); cursor:pointer; font-weight:bold;" onclick="toggleAuth(true)">Regístrate</span></p>
            </div>

            <div id="auth-register-view" style="display:none;">
                <h2 style="text-align:center; color:var(--naranja); font-size:3.5rem;">REGISTRO</h2>
                <label style="color:red;">LLAVE MAESTRA DE REGISTRO:</label>
                <input type="password" id="reg-master-key" placeholder="madielomar19">
                <hr>
                <label>Nombre Usuario:</label> <input type="text" id="reg-user">
                <label>Correo:</label> <input type="email" id="reg-email">
                <label>Clave Nueva:</label> <input type="password" id="reg-pass">
                <button class="btn-llanero" onclick="registrarUsuario()">CREAR CUENTA</button>
                <p style="text-align:center; margin-top:25px;"><span style="color:var(--naranja); cursor:pointer;" onclick="toggleAuth(false)">Volver</span></p>
            </div>

            <div id="auth-logged-in" style="display:none; text-align:center;">
                <h2 style="color:green; font-size:3.5rem;">SESIÓN ACTIVA</h2>
                <button class="btn-llanero" onclick="irAlPanel()">⚙️ ABRIR PANEL</button>
                <button class="btn-llanero" style="background:#666; margin-top:25px;" onclick="cerrarSesion()">SALIR</button>
            </div>
        </div>
    </div>

    <div id="admin-panel" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:var(--fondo); z-index:3000; overflow-y:auto; padding:30px;">
        <button onclick="cerrarAdmin()" style="float:right; background:red; color:white; border:none; padding:20px; font-weight:bold; font-size:1.8rem; border-radius:15px;">CERRAR</button>
        <h2 style="color:var(--oro); font-size:3rem;">ADMINISTRACIÓN</h2>

        <div style="display:flex; gap:10px; margin-bottom:30px;">
            <button class="nav-tab active" onclick="switchTab(event, 'tab-datos')">DATOS</button>
            <button class="nav-tab" onclick="switchTab(event, 'tab-comidas')">PRODUCTOS</button>
            <button class="nav-tab" onclick="switchTab(event, 'tab-categorias')">CATEGORÍAS</button>
        </div>

        <div id="tab-datos" class="admin-section active">
            <label>Nombre Negocio:</label> <input type="text" id="conf-nombre">
            <label>WhatsApp:</label> <input type="text" id="conf-whatsapp">
            <label>Tasa Dólar:</label> <input type="number" id="conf-tasa" step="0.01">
            <h3 style="color:var(--oro); margin-top:30px;">LINKS DE REDES</h3>
            <label>Facebook:</label> <input type="text" id="conf-fb">
            <label>Instagram:</label> <input type="text" id="conf-ig">
            <label>TikTok:</label> <input type="text" id="conf-tk">
            <button class="btn-llanero" onclick="guardarConfiguracion()">GUARDAR TODO</button>
        </div>

        <div id="tab-comidas" class="admin-section" style="display:none;">
            <input type="hidden" id="edit-index" value="-1">
            <label>Nombre:</label> <input type="text" id="plato-nombre">
            <label>Categoría:</label> <select id="plato-categoria"></select>
            <label>Precio Bs:</label> <input type="number" id="plato-precio">
            <label>Foto:</label> <input type="file" id="plato-foto" accept="image/*">
            <button class="btn-llanero" onclick="guardarPlato()">GUARDAR PLATO</button>
        </div>

        <div id="tab-categorias" class="admin-section" style="display:none;">
            <label>Nueva Categoría:</label> <input type="text" id="nueva-cat-nombre">
            <button class="btn-llanero" onclick="agregarCategoria()">AÑADIR</button>
            <div id="lista-categorias-admin" style="margin-top:40px;"></div>
        </div>
    </div>

    <div id="modal-carrito" class="modal">
        <div class="modal-content">
            <span style="float:right; cursor:pointer; font-size:50px" onclick="cerrarModal('modal-carrito')">&times;</span>
            <h2 style="color:var(--naranja); font-size:3rem;">🛒 TU PEDIDO</h2>
            <div id="lista-carrito" style="max-height:450px; overflow-y:auto; color:black; font-size:1.5rem;"></div>
            <div id="total-carrito-area" style="color:black; font-weight:bold; font-size:2.2rem; border-top:6px solid var(--soga); padding-top:20px;"></div>
            <button class="btn-llanero" style="background:#25d366; margin-top:35px;" onclick="enviarWhatsApp()">PEDIR WHATSAPP</button>
        </div>
    </div>

    <div id="menu-cliente" class="grid-platos"></div>

    <script src="script.js"></script>
</body>
</html>
